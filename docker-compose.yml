services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: uwd_db
      POSTGRES_USER: uwd
      POSTGRES_PASSWORD: uwd
    ports:
      - "5432:5432"
    volumes:
      - uwd_pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://uwd:uwd@db:5432/uwd_db
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  uwd_pg_data:
